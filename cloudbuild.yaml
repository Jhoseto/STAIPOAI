##############################################################
# cloudbuild.yaml — STAIPO AI | GitHub → Cloud Run
#
# Деплойва 2 сервиса при всеки push в main:
#   • staipo-ai-data  (FastAPI backend — backend/ai-data/)
#   • staiposerver    (Next.js frontend — frontend/web/)
#
# Всички ключове се задават в GCP Console:
# Cloud Build → Triggers → Edit → Substitution variables
# НЕ слагай реални ключове в този файл!
##############################################################

substitutions:
  _REGION: europe-west1
  _FRONTEND_SERVICE: staiposerver
  _BACKEND_SERVICE: staipo-ai-data
  _FRONTEND_URL: https://staiposerver-1083584564861.europe-west1.run.app
  _NEXT_PUBLIC_SUPABASE_URL: ""
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
  _SUPABASE_URL: ""
  _SUPABASE_ANON_KEY: ""
  _SUPABASE_SERVICE_ROLE_KEY: ""
  _GEMINI_API_KEY: ""
  _NEXTAUTH_SECRET: ""
  _GOOGLE_CLIENT_ID: ""
  _GOOGLE_CLIENT_SECRET: ""

steps:
  # ── 1 & 2. Build backend и frontend паралелно ─────────────
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/$_BACKEND_SERVICE:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/$_BACKEND_SERVICE:latest
      - backend/ai-data

  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/$_FRONTEND_SERVICE:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/$_FRONTEND_SERVICE:latest
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=$_NEXT_PUBLIC_SUPABASE_URL
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=$_NEXT_PUBLIC_SUPABASE_ANON_KEY
      - frontend/web

  # ── 3 & 4. Push паралелно ─────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    waitFor: [build-backend]
    args: [push, --all-tags, gcr.io/$PROJECT_ID/$_BACKEND_SERVICE]

  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    waitFor: [build-frontend]
    args: [push, --all-tags, gcr.io/$PROJECT_ID/$_FRONTEND_SERVICE]

  # ── 5. Deploy BACKEND ─────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_BACKEND_SERVICE
      - --image=gcr.io/$PROJECT_ID/$_BACKEND_SERVICE:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --set-env-vars=SUPABASE_URL=$_SUPABASE_URL,SUPABASE_SERVICE_ROLE_KEY=$_SUPABASE_SERVICE_ROLE_KEY,SUPABASE_ANON_KEY=$_SUPABASE_ANON_KEY,SUPABASE_DB_SCHEMA=public,SUPABASE_STORAGE_BUCKET_UPLOADS=uploads,SUPABASE_STORAGE_BUCKET_OFFERS=offers,GEMINI_API_KEY=$_GEMINI_API_KEY,CORS_ALLOW_ORIGINS=$_FRONTEND_URL

  # ── 6. Вземи URL-а на backend-а автоматично ───────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: get-backend-url
    waitFor: [deploy-backend]
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(gcloud run services describe $_BACKEND_SERVICE \
          --region=$_REGION \
          --format='value(status.url)')
        echo "Backend URL: $$BACKEND_URL"
        echo -n "$$BACKEND_URL" > /workspace/backend_url.txt

  # ── 7. Deploy FRONTEND с правилен AI_DATA_URL ─────────────
  #   AI_DATA_URL = URL на backend сервиса (runtime env var)
  #   Четен от app/api/ai/[...path]/route.ts при всяка заявка
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    waitFor: [push-frontend, get-backend-url]
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        echo "Deploying frontend → AI_DATA_URL=$$BACKEND_URL"
        gcloud run deploy $_FRONTEND_SERVICE \
          --image=gcr.io/$PROJECT_ID/$_FRONTEND_SERVICE:$COMMIT_SHA \
          --region=$_REGION \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --set-env-vars="AI_DATA_URL=$$BACKEND_URL,NEXT_PUBLIC_SUPABASE_URL=$_NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY=$_NEXT_PUBLIC_SUPABASE_ANON_KEY,SUPABASE_URL=$_SUPABASE_URL,SUPABASE_ANON_KEY=$_SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY=$_SUPABASE_SERVICE_ROLE_KEY,NEXTAUTH_URL=$_FRONTEND_URL,NEXTAUTH_SECRET=$_NEXTAUTH_SECRET,GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET=$_GOOGLE_CLIENT_SECRET"

images:
  - gcr.io/$PROJECT_ID/$_BACKEND_SERVICE:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/$_BACKEND_SERVICE:latest
  - gcr.io/$PROJECT_ID/$_FRONTEND_SERVICE:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/$_FRONTEND_SERVICE:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
