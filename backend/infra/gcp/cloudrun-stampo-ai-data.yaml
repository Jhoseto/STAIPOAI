apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: staipo-ai-data
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/staipo-ai-data:latest
          ports:
            - name: http1
              containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql+psycopg://staipo:staipo@HOST:5432/staipo

