apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: staipo-web
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/staipo-web:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: AI_DATA_URL
              value: https://staipo-ai-data-xxxxx.a.run.app

